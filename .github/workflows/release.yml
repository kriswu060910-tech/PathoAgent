name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Sync version from git tag
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          TAG="${TAG#v}"
          node -e "
            const fs = require('fs');
            const tag = process.env.TAG;
            const conf = JSON.parse(fs.readFileSync('web/src-tauri/tauri.conf.json','utf8'));
            conf.version = tag;
            fs.writeFileSync('web/src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            const pkg = JSON.parse(fs.readFileSync('web/package.json','utf8'));
            pkg.version = tag;
            fs.writeFileSync('web/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web
          args: --verbose

      - name: Generate checksums
        shell: bash
        run: |
          cd web/src-tauri/target/release/bundle/nsis
          sha256sum *.exe > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web/src-tauri/target/release/bundle/nsis/*.exe
            web/src-tauri/target/release/bundle/nsis/SHA256SUMS.txt
